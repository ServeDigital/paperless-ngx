name: Build and Deploy Gold Leaf DMS

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA tag
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            edms/goldleaf-dms:latest
            edms/goldleaf-dms:${{ steps.vars.outputs.sha_short }}

  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EDMS_VPS_HOST }}
          username: ${{ secrets.EDMS_VPS_USER }}
          key: ${{ secrets.EDMS_VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/zabbu-dms

            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' zabbu-web 2>/dev/null || echo "")
            echo "Current image: ${PREV_IMAGE:-none}"

            echo "Pulling latest image from Docker Hub..."
            docker compose pull webserver

            echo "Restarting webserver..."
            docker compose up -d --no-deps webserver

            echo "Waiting for webserver to become healthy..."
            HEALTHY=false
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' zabbu-web 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              echo "Attempt $i/30 — status: $STATUS, retrying in 10s..."
              sleep 10
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "Deployment successful!"
              docker compose ps webserver
              exit 0
            fi

            echo "Health check failed after 30 attempts!"
            docker compose logs --tail=50 webserver

            if [ -n "$PREV_IMAGE" ]; then
              echo "Rolling back to previous image: $PREV_IMAGE"
              docker compose up -d --no-deps webserver
            fi
            exit 1
